name: Android CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x java_app/gradlew
      - run: cd java_app && ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: java_app/app/build/outputs/apk/debug/app-debug.apk
